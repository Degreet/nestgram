# Data services for the reminder bot. Bring them up with `docker compose up -d`,
# then run the bot on the host with `npm run start:dev`. The defaults match
# .env.example (DATABASE_URL / REDIS_*).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nestgram
      POSTGRES_PASSWORD: nestgram
      POSTGRES_DB: reminders
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nestgram -d reminders']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
